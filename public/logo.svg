<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" fill="none">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a853" />
      <stop offset="50%" stop-color="#c9952c" />
      <stop offset="100%" stop-color="#d4a853" />
    </linearGradient>
    <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4a853" stop-opacity="0" />
      <stop offset="50%" stop-color="#d4a853" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#d4a853" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Decorative top line -->
  <line x1="180" y1="45" x2="420" y2="45" stroke="url(#goldGrad2)" stroke-width="1" />

  <!-- Diamond emblem -->
  <rect x="285" y="55" width="30" height="30" rx="2" transform="rotate(45 300 70)" stroke="url(#goldGrad)" stroke-width="1.5" fill="none" />
  <rect x="293" y="63" width="14" height="14" rx="1" transform="rotate(45 300 70)" fill="url(#goldGrad)" />

  <!-- LA SOCIEDAD text -->
  <text x="300" y="125" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" font-size="36" font-weight="700" letter-spacing="8" fill="url(#goldGrad)">LA SOCIEDAD</text>

  <!-- Tagline -->
  <text x="300" y="150" text-anchor="middle" font-family="'Inter', 'Arial', sans-serif" font-size="10" font-weight="400" letter-spacing="5" fill="#888" text-transform="uppercase">EXCLUSIVE EVENTS &amp; EXPERIENCES</text>

  <!-- Decorative bottom line -->
  <line x1="180" y1="160" x2="420" y2="160" stroke="url(#goldGrad2)" stroke-width="1" />
</svg>
