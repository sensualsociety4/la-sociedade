<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" fill="none">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a853" />
      <stop offset="50%" stop-color="#c9952c" />
      <stop offset="100%" stop-color="#d4a853" />
    </linearGradient>
  </defs>

  <!-- LS Monogram -->
  <g transform="translate(300, 48)">
    <rect x="-24" y="-24" width="48" height="48" rx="2" stroke="url(#g)" stroke-width="0.8" fill="none" opacity="0.3" />
    <text x="0" y="9" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="28" font-weight="600" fill="url(#g)" letter-spacing="-1">LS</text>
  </g>

  <!-- LA SOCIEDAD -->
  <text x="300" y="100" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="22" font-weight="500" fill="#ffffff" letter-spacing="8">LA SOCIEDAD</text>

  <!-- Tagline -->
  <text x="300" y="122" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="7.5" font-weight="300" fill="rgba(255,255,255,0.25)" letter-spacing="4">EXCLUSIVE VENUE · BY INVITATION ONLY</text>

  <!-- Subtle line -->
